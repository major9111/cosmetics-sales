{% extends "base/base.html" %}
{% block title %}Add Staff{% endblock %}
{% block page_title %}Add Staff Member{% endblock %}
{% block content %}
<div style="max-width:560px;">
  <div class="card">
    <div class="card-title">New Staff Account</div>
    <form method="post">
      {% csrf_token %}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input class="form-control" name="first_name" placeholder="e.g. Fatima" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input class="form-control" name="last_name" placeholder="e.g. Aliyu"/>
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Username</label>
          <input class="form-control" name="username" placeholder="e.g. fatima_aliyu" required/>
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Password</label>
          <input class="form-control" name="password1" type="password" placeholder="Min. 8 characters" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-control" name="role">
            <option value="cashier">Cashier</option>
            <option value="branch_manager">Branch Manager</option>
            <option value="super_admin">Super Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Branch</label>
          <select class="form-control" name="branch">
            <option value="">— No Branch —</option>
            {% for b in branches %}<option value="{{ b.id }}">{{ b.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Phone</label>
          <input class="form-control" name="phone" placeholder="e.g. 0803 000 0000"/>
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Email (optional)</label>
          <input class="form-control" name="email" type="email" placeholder="e.g. fatima@cosmetica.com"/>
        </div>
      </div>
      <hr class="divider"/>
      <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">Create Account</button>
        <a href="{% url 'user_list' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
