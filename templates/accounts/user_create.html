{% extends "base/base.html" %}
{% block title %}Add Staff{% endblock %}
{% block page_title %}Add Staff Member{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;">
  <div class="card-title">New Staff Account</div>
  <form method="post">
    {% csrf_token %}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div class="form-group">
        <label class="form-label">FIRST NAME</label>
        <input class="form-control" name="first_name" required/>
      </div>
      <div class="form-group">
        <label class="form-label">LAST NAME</label>
        <input class="form-control" name="last_name"/>
      </div>
      <div class="form-group" style="grid-column:1/-1;">
        <label class="form-label">USERNAME</label>
        <input class="form-control" name="username" required/>
      </div>
      <div class="form-group" style="grid-column:1/-1;">
        <label class="form-label">PASSWORD</label>
        <input class="form-control" name="password1" type="password" required/>
      </div>
      <div class="form-group">
        <label class="form-label">ROLE</label>
        <select class="form-control" name="role">
          <option value="cashier">Cashier</option>
          <option value="branch_manager">Branch Manager</option>
          <option value="super_admin">Super Admin</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">BRANCH</label>
        <select class="form-control" name="branch">
          <option value="">— Select —</option>
          {% for b in branches %}<option value="{{ b.id }}">{{ b.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group" style="grid-column:1/-1;">
        <label class="form-label">PHONE</label>
        <input class="form-control" name="phone" placeholder="e.g. 0803 000 0000"/>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button type="submit" class="btn btn-primary">Create Account</button>
      <a href="{% url 'user_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
