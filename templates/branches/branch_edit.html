{% extends "base/base.html" %}
{% block title %}Edit Branch{% endblock %}
{% block page_title %}Edit Branch{% endblock %}
{% block content %}
<div style="max-width:520px;">
  <div class="card">
    <div class="card-title">Edit: {{ branch.name }}</div>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Branch Name</label>
        <input class="form-control" name="name" value="{{ branch.name }}" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Location / Address</label>
        <input class="form-control" name="location" value="{{ branch.location }}" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-control" name="phone" value="{{ branch.phone }}"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" name="email" type="email" value="{{ branch.email }}"/>
      </div>
<div class="form-group" style="display:flex;align-items:center;gap:10px;">
        <input type="checkbox" name="is_main" id="isMain" style="width:auto;"
          {% if branch.is_main %}checked{% endif %}/>
        <label for="isMain" style="font-size:13px;color:var(--text);margin:0;">This is the main store / head office</label>
      </div>
      <hr class="divider"/>
      <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'branch_list' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
