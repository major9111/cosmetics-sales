{% extends "base/base.html" %}
{% block title %}Add Branch{% endblock %}
{% block page_title %}Add Branch{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;">
  <div class="card-title">New Branch</div>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">BRANCH NAME</label>
      <input class="form-control" name="name" placeholder="e.g. Gusau Main Store" required/>
    </div>
    <div class="form-group">
      <label class="form-label">LOCATION / ADDRESS</label>
      <input class="form-control" name="location" placeholder="e.g. Market Road, Gusau" required/>
    </div>
    <div class="form-group">
      <label class="form-label">PHONE</label>
      <input class="form-control" name="phone" placeholder="e.g. 0803 000 0000"/>
    </div>
    <div class="form-group">
      <label class="form-label">EMAIL</label>
      <input class="form-control" name="email" type="email"/>
    </div>
    <div class="form-group" style="display:flex;align-items:center;gap:10px;">
      <input type="checkbox" name="is_main" id="isMain" style="width:auto;"/>
      <label for="isMain" style="font-size:13px;color:var(--text);margin:0;">This is the main store / head office</label>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button type="submit" class="btn btn-primary">Create Branch</button>
      <a href="{% url 'branch_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
