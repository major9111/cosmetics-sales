{% extends "base/base.html" %}
{% block title %}Record Expense{% endblock %}
{% block page_title %}Record Expense{% endblock %}
{% block content %}
<div style="max-width:520px;">
  <div class="card">
    <div class="card-title">New Expense</div>
    <form method="post">
      {% csrf_token %}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Title</label>
          <input class="form-control" name="title" required placeholder="e.g. Generator fuel, Shop rent..."/>
        </div>
        <div class="form-group">
          <label class="form-label">Amount (₦)</label>
          <input class="form-control" name="amount" type="number" min="0" step="0.01" required placeholder="0.00"/>
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input class="form-control" name="date" type="date" value="{{ today }}" required/>
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Category</label>
          <select class="form-control" name="category">
            <option value="">— Select or type new below —</option>
            {% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Or New Category Name</label>
          <input class="form-control" name="new_category" placeholder="Type new category name..."/>
        </div>
        {% if branches %}
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Branch</label>
          <select class="form-control" name="branch">
            {% for b in branches %}<option value="{{ b.id }}">{{ b.name }}</option>{% endfor %}
          </select>
        </div>
        {% endif %}
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Description (optional)</label>
          <input class="form-control" name="description" placeholder="Additional details..."/>
        </div>
      </div>
      <hr class="divider"/>
      <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">Save Expense</button>
        <a href="{% url 'expense_list' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
