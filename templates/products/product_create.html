{% extends "base/base.html" %}
{% block title %}Add Product{% endblock %}
{% block page_title %}Add Product{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
  <div class="card-title">New Product</div>
  <form method="post">{% csrf_token %}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div class="form-group" style="grid-column:1/-1;">
        <label class="form-label">PRODUCT NAME</label>
        <input class="form-control" name="name" required/>
      </div>
      <div class="form-group">
        <label class="form-label">BRAND</label>
        <input class="form-control" name="brand"/>
      </div>
      <div class="form-group">
        <label class="form-label">CATEGORY</label>
        <select class="form-control" name="category">
          <option value="">— Select —</option>
          {% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">COST PRICE (₦)</label>
        <input class="form-control" name="cost_price" type="number" step="0.01" required/>
      </div>
      <div class="form-group">
        <label class="form-label">SELLING PRICE (₦)</label>
        <input class="form-control" name="selling_price" type="number" step="0.01" required/>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button type="submit" class="btn btn-primary">Save Product</button>
      <a href="{% url 'product_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
