{% extends "base/base.html" %}
{% block title %}Edit Product{% endblock %}
{% block page_title %}Edit Product{% endblock %}
{% block content %}
<div class="card" style="max-width:680px;">
  <div class="card-title">Edit: {{ product.name }}</div>
  <form method="post">{% csrf_token %}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div class="form-group" style="grid-column:1/-1;">
        <label class="form-label">Product Name</label>
        <input class="form-control" name="name" value="{{ product.name }}" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Brand</label>
        <input class="form-control" name="brand" value="{{ product.brand }}"/>
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-control" name="category">
          <option value="">— None —</option>
          {% for c in categories %}<option value="{{ c.id }}" {% if product.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Cost Price (₦)</label>
        <input class="form-control" name="cost_price" type="number" step="0.01" value="{{ product.cost_price }}" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Selling Price (₦)</label>
        <input class="form-control" name="selling_price" type="number" step="0.01" value="{{ product.selling_price }}" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Supplier</label>
        <select class="form-control" name="supplier">
          <option value="">— No Supplier —</option>
          {% for s in suppliers %}<option value="{{ s.id }}" {% if product.supplier_id == s.id %}selected{% endif %}>{{ s.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Barcode</label>
        <input class="form-control" name="barcode" value="{{ product.barcode|default:'' }}" placeholder="Scan or type barcode..."/>
      </div>
      <div class="form-group">
        <label class="form-label">Expiry Date</label>
        <input class="form-control" name="expiry_date" type="date" value="{{ product.expiry_date|date:'Y-m-d'|default:'' }}"/>
      </div>
      <div class="form-group">
        <label class="form-label">Reorder Level</label>
        <input class="form-control" name="reorder_level" type="number" min="0" value="{{ product.reorder_level|default:10 }}"/>
      </div>
      <div class="form-group" style="grid-column:1/-1;">
        <label class="form-label">Description</label>
        <input class="form-control" name="description" value="{{ product.description }}"/>
      </div>
    </div>
    <hr class="divider"/>
    <div style="display:flex;gap:10px;">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{% url 'product_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
